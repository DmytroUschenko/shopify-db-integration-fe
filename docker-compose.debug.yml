services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.debug
    ports:
      - "3005:3005"
      - "9229:9229"       # Node.js inspector — attach VS Code / Chrome DevTools here
    volumes:
      - .:/app            # Mount source for live editing
      - /app/node_modules # Keep container node_modules isolated
      # NOTE: /app/build is intentionally NOT isolated — host build output must
      # flow through so that `node --watch` inside the container detects changes.
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-shopify_frontend}
      SHOPIFY_API_KEY: ${SHOPIFY_API_KEY}
      SHOPIFY_API_SECRET: ${SHOPIFY_API_SECRET}
      APP_URL: ${APP_URL:-http://localhost:3005}
      SCOPES: ${SCOPES:-write_products,read_orders,read_order_edits,read_customer_events,read_customers,read_customer_merge,read_customer_data_erasure}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:3001}
      BACKEND_API_KEY: ${BACKEND_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-shopify_frontend}
    ports:
      - "5433:5432"
    volumes:
      - pgdata_debug:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata_debug:
